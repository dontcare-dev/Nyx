<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NyX Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: #fff;
      overflow-x: hidden;
      width: 100vw;
      position: relative;
      animation: bgShift 10s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%); }
      50% { background: radial-gradient(ellipse at 70% 50%, #250000 0%, #0a0000 50%, #020000 100%); }
      100% { background: radial-gradient(ellipse at 30% 90%, #1a0000 0%, #0a0000 50%, #020000 100%); }
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      z-index: 0; pointer-events: none; animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #ff3333, transparent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #cc0000, transparent); bottom: -200px; right: -200px; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ff5555, transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    canvas#particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8;
    }

    .tab-nav {
      position: relative; z-index: 2;
      display: flex; justify-content: center; gap: 15px;
      margin-bottom: 30px; flex-wrap: wrap;
    }
    .tab-btn {
      background: rgba(255,50,50,0.15);
      border: 1px solid rgba(255,50,50,0.4);
      color: #ffaaaa;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: 600; letter-spacing: 1px;
      cursor: pointer; transition: 0.3s;
      font-size: 1rem;
      backdrop-filter: blur(5px);
    }
    .tab-btn.active {
      background: rgba(255,50,50,0.4);
      color: #fff;
      border-color: #ff5555;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 1300px; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .tab-content { display: none; width: 100%; opacity: 0; transition: opacity 0.3s ease; }
    .tab-content.active { display: block; opacity: 1; }

    .cards-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; width: 100%; }

    .glass {
      background: rgba(20, 0, 0, 0.25);
      border: 1px solid rgba(255, 60, 60, 0.2);
      border-radius: 32px; padding: 30px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      width: 380px; max-width: 100%;
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute; top: 0; left: -50%; width: 200%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 45%, rgba(255,255,255,0.03) 50%, transparent 55%);
      pointer-events: none; animation: shine 4s ease-in-out infinite;
    }
    @keyframes shine { 0%,100% { transform: translateX(-100%); } 50% { transform: translateX(100%); } }
    .glass:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 35px 80px rgba(255, 0, 0, 0.5); border-color: rgba(255, 80, 80, 0.6); }

    .profile-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .avatar {
      width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,50,50,0.7); box-shadow: 0 0 40px rgba(255,0,0,0.6);
      animation: avatarGlitch 3s infinite; background: #2d0000;
    }
    @keyframes avatarGlitch { 0%,90%,100%{ transform: translate(0); } 92%{ transform: translate(-4px,3px) skew(2deg); } }
    .username, .clock {
      color: #fff; font-weight: 700; letter-spacing: 4px; position: relative; z-index: 2;
      text-shadow: 0 0 5px #fff, 0 0 10px #ff6666, 0 0 20px #ff1a1a;
      animation: glowPulse 1.5s infinite alternate;
    }
    .username { font-size: 2.6rem; margin-top: 25px; }
    .clock { font-size: 3rem; margin: 10px 0; }
    @keyframes glowPulse { from { text-shadow: 0 0 5px #fff, 0 0 10px #ff6666; } to { text-shadow: 0 0 10px #fff, 0 0 20px #ff8080, 0 0 40px #ff3333; } }

    .section-title {
      font-size: 1.6rem; font-weight: 600; margin-bottom: 25px;
      display: flex; align-items: center; gap: 12px; color: #ffbbbb;
      border-bottom: 2px solid rgba(255,50,50,0.4); padding-bottom: 12px; justify-content: center;
    }
    .spotify-embed { border-radius: 18px; overflow: hidden; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
    .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .dot.online { background: #43b581; } .dot.idle { background: #faa61a; } .dot.dnd { background: #f04747; } .dot.offline { background: #747f8d; }
    .date { color: #ffaaaa; font-size: 1.1rem; }
    .time-footer { margin-top: 30px; color: rgba(255,170,170,0.7); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="tab-nav">
      <div class="tab-btn active" data-tab="profile">Profile</div>
      <div class="tab-btn" data-tab="spotify">Spotify</div>
      <div class="tab-btn" data-tab="time">Time</div>
    </div>

    <div class="tab-content active" id="profile">
      <div class="cards-grid">
        <div class="glass profile-card">
          <img class="avatar" id="avatar" src="" alt="Avatar">
          <div class="username" id="username">Loading...</div>
          <div style="margin-top: 15px;"><span class="dot" id="statusDot"></span><span id="statusText">Loading...</span></div>
          <p style="margin-top: 10px; color: #ccc; font-style: italic;" id="customStatus"></p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="spotify">
      <div class="cards-grid">
        <div class="glass">
          <div class="section-title">Spotify</div>
          <div class="spotify-embed">
            <iframe src="https://open.spotify.com/embed/playlist/0" width="100%" height="152" frameborder="0" allow="autoplay; encrypted-media"></iframe>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="time">
      <div class="cards-grid">
        <div class="glass" style="text-align: center;">
          <div class="section-title">Time (IST)</div>
          <div class="clock" id="clock">--:--:--</div>
          <div class="date" id="date">---</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Particles (Simplified)
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    
    // Tab Logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
      document.getElementById('date').innerText = now.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', month: 'long', day: 'numeric' });
    }, 1000);

    // Lanyard API
    const USER_ID = "1418597263479144471";
    async function updateDiscord() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const data = (await res.json()).data;
        document.getElementById("username").innerText = data.discord_user.global_name;
        document.getElementById("avatar").src = `https://cdn.discordapp.com/avatars/${USER_ID}/${data.discord_user.avatar}.png?size=512`;
        document.getElementById("statusDot").className = "dot " + data.discord_status;
        document.getElementById("statusText").innerText = data.discord_status.toUpperCase();
        document.getElementById("customStatus").innerText = data.activities.find(a => a.type === 4)?.state || "";
      } catch(e) { console.error(e); }
    }
    updateDiscord(); setInterval(updateDiscord, 30000);
  </script>
</body>
</html>
