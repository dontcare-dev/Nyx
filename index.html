<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>nyx dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12;
      z-index: 0; pointer-events: none;
      animation: orbFade 6s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #ff3333, transparent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #cc0000, transparent); bottom: -200px; right: -200px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ff5555, transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -5s; }
    @keyframes orbFade {
      0% { opacity: 0.08; }
      100% { opacity: 0.18; }
    }

    canvas#particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.6;
    }

    #matrixCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.35;
    }

    .dashboard {
      position: relative; z-index: 1;
      width: 100%; max-width: 1350px;
      padding: 30px 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 25px;
    }

    .header {
      width: 100%; max-width: 1000px;
      background: rgba(18, 0, 0, 0.25);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 70, 70, 0.2);
      border-radius: 44px;
      padding: 22px 35px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 15px;
      box-shadow: 0 22px 55px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: headerSlide 0.7s ease-out;
    }
    @keyframes headerSlide {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .greeting {
      font-size: 1.85rem; font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 0 15px #ff0000, 0 0 30px rgba(255,0,0,0.5);
    }

    .live-clock {
      font-size: 1.85rem; font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 15px #ff0000, 0 0 30px rgba(255,0,0,0.5);
    }

    .cards-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 22px; width: 100%;
    }

    .glass {
      background: rgba(20, 0, 0, 0.22);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 70, 70, 0.18);
      border-radius: 38px;
      padding: 25px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      width: 310px; max-width: 100%;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      animation: cardPop 0.5s ease-out backwards;
    }
    .glass:nth-child(1) { animation-delay: 0.1s; }
    .glass:nth-child(2) { animation-delay: 0.2s; }
    .glass:nth-child(3) { animation-delay: 0.3s; }
    .glass:nth-child(4) { animation-delay: 0.4s; }
    .glass:nth-child(5) { animation-delay: 0.5s; }
    .glass:nth-child(6) { animation-delay: 0.6s; }
    .glass:nth-child(7) { animation-delay: 0.7s; }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .glass::after {
      content: '';
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.02) 50%, transparent 55%);
      background-size: 200% 100%;
      animation: shine 4s ease-in-out infinite;
      z-index: 0; pointer-events: none;
      border-radius: 38px;
    }
    @keyframes shine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .glass:hover {
      transform: translateY(-6px);
      box-shadow: 0 35px 80px rgba(255, 0, 0, 0.55);
      border-color: rgba(255, 90, 90, 0.6);
    }

    .card-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }

    .avatar {
      width: 115px; height: 115px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,50,50,0.7);
      box-shadow: 0 0 30px rgba(255,0,0,0.5);
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      animation: ringPulse 2s infinite;
    }
    @keyframes ringPulse {
      0%,100% { border-color: rgba(255,50,50,0.7); box-shadow: 0 0 30px rgba(255,0,0,0.5); }
      50% { border-color: rgba(255,90,90,0.9); box-shadow: 0 0 60px rgba(255,0,0,0.8); }
    }
    .avatar:hover { transform: scale(1.07); border-color: #ff4444; box-shadow: 0 0 70px rgba(255,0,0,0.9); }

    .username {
      font-size: 1.8rem; font-weight: 700;
      margin-top: 15px;
      color: #fff;
      text-shadow: 0 0 8px #ff0000, 0 0 20px rgba(255,0,0,0.6);
    }

    .status-row {
      margin-top: 10px; display: flex; align-items: center; gap: 6px;
      color: #ffaaaa; font-size: 0.95rem;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .dot.online { background: #43b581; }
    .dot.idle { background: #faa61a; }
    .dot.dnd { background: #f04747; }
    .dot.offline { background: #747f8d; }

    .custom-status {
      margin-top: 8px; color: #ccc; font-style: italic; font-size: 0.9rem;
      opacity: 0.8;
    }

    .spotify-embed {
      width: 100%; border-radius: 18px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .luau-tip {
      font-size: 1rem; color: #ffbbbb; margin-top: 10px;
      text-align: center; line-height: 1.5;
      transition: opacity 0.3s;
      text-shadow: 0 0 6px rgba(255,0,0,0.4);
    }

    .timer-display {
      font-size: 2.2rem; font-weight: 700; letter-spacing: 3px;
      margin: 8px 0;
      text-shadow: 0 0 15px #ff0000;
    }
    .pomodoro-controls {
      display: flex; gap: 10px; margin-top: 15px;
    }
    .pomo-btn {
      background: rgba(255,50,50,0.2); border: 1px solid rgba(255,50,50,0.4);
      color: #fff; padding: 8px 18px; border-radius: 25px;
      cursor: pointer; font-weight: 600; transition: 0.3s;
      font-size: 0.9rem; letter-spacing: 1px;
    }
    .pomo-btn:hover { background: rgba(255,50,50,0.4); }
    .pomo-btn.active { background: rgba(255,50,50,0.6); border-color: #ff5555; }

    .section-title {
      font-size: 1.2rem; font-weight: 600; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px; color: #ffbbbb;
      text-shadow: 0 0 10px rgba(255,80,80,0.5);
      border-bottom: 2px solid rgba(255,50,50,0.3); padding-bottom: 8px;
      justify-content: center;
    }
    .section-title svg { width: 18px; height: 18px; }

    .crypto-price {
      font-size: 2.2rem; font-weight: 700;
      text-shadow: 0 0 12px #ff0000;
      animation: priceFade 0.5s ease;
    }
    @keyframes priceFade {
      from { opacity: 0.5; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .discord-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 15px;
      background: rgba(88,101,242,0.15); border: 1px solid #5865F2;
      color: #fff; padding: 10px 20px; border-radius: 30px;
      text-decoration: none; font-weight: 600; transition: 0.3s;
    }
    .discord-link:hover { background: #5865F2; }

    /* ---- Watermark Typing Cell ---- */
    .watermark-cell {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }
    .watermark-text {
      font-family: 'Courier New', monospace;
      font-size: 4rem;
      font-weight: bold;
      color: #ff5555;
      text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
      letter-spacing: 8px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 4px solid #ff5555;
      animation: blinkCursor 0.8s infinite;
    }
    @keyframes blinkCursor {
      0%, 100% { border-color: transparent; }
      50% { border-color: #ff5555; }
    }

    @media (max-width: 768px) {
      .header { flex-direction: column; text-align: center; }
      .glass { width: 100%; }
      .watermark-text { font-size: 2.5rem; letter-spacing: 4px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>
  <canvas id="matrixCanvas"></canvas>

  <div class="dashboard">
    <div class="header">
      <div class="greeting" id="greeting">Good Evening, nyx</div>
      <div class="live-clock" id="liveClock">00:00:00</div>
    </div>

    <div class="cards-grid">
      <!-- Profile Card -->
      <div class="glass">
        <div class="card-content">
          <img class="avatar" id="avatar" src="" alt="Avatar">
          <div class="username" id="username">nyx._.dev</div>
          <div class="status-row">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Loading...</span>
          </div>
          <div class="custom-status" id="customStatus"></div>
        </div>
      </div>

      <!-- Spotify Card -->
      <div class="glass">
        <div class="card-content">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.48.179-1.08-.061-1.261-.54-.18-.48.06-1.08.54-1.26 4.08-1.32 11.04-1.02 15.721 1.621.539.24.779.899.539 1.44-.24.54-.899.779-1.44.539z"/></svg>
            Spotify
          </div>
          <div class="spotify-embed">
            <iframe src="https://open.spotify.com/embed/playlist/3p7lx9U0uQnIPoo4XNajfX?utm_source=generator&theme=0" 
                    width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    loading="lazy" style="border-radius:12px;"></iframe>
          </div>
        </div>
      </div>

      <!-- Luau Tip Card -->
      <div class="glass">
        <div class="card-content">
          <div class="section-title">Luau Tip</div>
          <div class="luau-tip" id="luauTip">"Use task.wait() instead of wait() for better performance."</div>
        </div>
      </div>

      <!-- Pomodoro Card -->
      <div class="glass">
        <div class="card-content">
          <div class="section-title">Pomodoro</div>
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="pomodoro-controls">
            <button class="pomo-btn active" id="pomoStart">Start</button>
            <button class="pomo-btn" id="pomoReset">Reset</button>
          </div>
          <p style="margin-top: 10px; color: #ffaaaa; font-size: 0.85rem;" id="pomoStatus">Work session</p>
        </div>
      </div>

      <!-- Bitcoin Card -->
      <div class="glass">
        <div class="card-content">
          <div class="section-title">₿ Bitcoin</div>
          <div class="crypto-price" id="btcPrice">...</div>
          <p style="color: #ffaaaa; font-size: 0.8rem; margin-top: 4px;" id="btcChange">–</p>
        </div>
      </div>

      <!-- Quick Links Card -->
      <div class="glass">
        <div class="card-content">
          <div class="section-title">Quick Links</div>
          <a class="discord-link" href="https://discord.gg/eternalcrimson" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.88-1.51.07.07 0 0 0-.08.04c-.2.38-.42.86-.57 1.22a18.6 18.6 0 0 0-5.54 0c-.15-.37-.38-.85-.58-1.22a.08.08 0 0 0-.08-.04 19.8 19.8 0 0 0-4.88 1.51.07.07 0 0 0-.03.03C1.66 9.42.63 14.36.95 19.18a.08.08 0 0 0 .05.06 19.73 19.73 0 0 0 5.96 2.99.08.08 0 0 0 .08-.03c.46-.62.86-1.28 1.2-1.96a.08.08 0 0 0-.04-.11c-.65-.25-1.28-.55-1.88-.9a.08.08 0 0 1-.01-.13c.13-.1.26-.2.38-.3a.08.08 0 0 1 .08-.02 14.1 14.1 0 0 0 12.06 0 .08.08 0 0 1 .08.02c.12.1.25.21.38.3a.08.08 0 0 1 0 .13c-.6.35-1.23.66-1.88.9a.08.08 0 0 0-.04.11c.34.68.74 1.34 1.2 1.96a.08.08 0 0 0 .08.03 19.65 19.65 0 0 0 5.97-2.99.08.08 0 0 0 .05-.06c.38-5.57-.99-10.41-4.16-14.7a.07.07 0 0 0-.04-.03zM8.68 15.4c-1.38 0-2.52-1.27-2.52-2.83s1.12-2.84 2.52-2.84 2.54 1.28 2.52 2.84c0 1.56-1.12 2.83-2.52 2.83zm6.64 0c-1.38 0-2.52-1.27-2.52-2.83s1.12-2.84 2.52-2.84 2.54 1.28 2.52 2.84c0 1.56-1.12 2.83-2.52 2.83z"/></svg>
            Discord
          </a>
        </div>
      </div>
    </div>

    <!-- Watermark Cell – big typing "nyx.tuff" -->
    <div class="watermark-cell">
      <div class="watermark-text" id="watermark"></div>
    </div>
  </div>

  <script>
    // ---------- Particle Background ----------
    const pCanvas = document.getElementById('particles');
    const pCtx = pCanvas.getContext('2d');
    let particles = [];
    let pw, ph;

    function resizeParticles() {
      pw = pCanvas.width = window.innerWidth;
      ph = pCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeParticles);
    resizeParticles();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * pw;
        this.y = Math.random() * ph;
        this.size = Math.random() * 1.5 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.3 + 0.05;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > pw) this.speedX *= -1;
        if (this.y < 0 || this.y > ph) this.speedY *= -1;
      }
      draw() {
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fillStyle = `rgba(255, 80, 80, ${this.opacity})`;
        pCtx.fill();
      }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());

    function animateParticles() {
      pCtx.clearRect(0, 0, pw, ph);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ---------- Matrix Rain ----------
    const mCanvas = document.getElementById('matrixCanvas');
    const mCtx = mCanvas.getContext('2d');
    let mw, mh, columns, drops;
    const fontSize = 20;
    const chars = "01";

    function setupMatrix() {
      mw = mCanvas.width = window.innerWidth;
      mh = mCanvas.height = window.innerHeight;
      columns = Math.floor(mw / fontSize) + 1;
      drops = Array(columns).fill(1);
    }
    window.addEventListener('resize', setupMatrix);
    setupMatrix();

    function drawMatrix() {
      mCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      mCtx.fillRect(0, 0, mw, mh);
      mCtx.font = `${fontSize}px monospace`;
      mCtx.textAlign = 'center';
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize + fontSize / 2;
        const y = drops[i] * fontSize;
        mCtx.fillStyle = '#ff3333';
        mCtx.shadowColor = '#ff0000';
        mCtx.shadowBlur = 6;
        mCtx.fillText(text, x, y);
        mCtx.shadowBlur = 0;
        if (y > mh && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 80);

    // ---------- Clock & Greeting ----------
    function updateClockAndGreeting() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
      document.getElementById('liveClock').textContent = timeStr;
      const hour = now.getHours();
      let greet;
      if (hour < 5) greet = "Good Midnight, nyx";
      else if (hour < 12) greet = "Good Morning, nyx";
      else if (hour < 17) greet = "Good Afternoon, nyx";
      else greet = "Good Evening, nyx";
      document.getElementById('greeting').textContent = greet;
    }
    updateClockAndGreeting();
    setInterval(updateClockAndGreeting, 1000);

    // ---------- Luau Tips ----------
    const luauTips = [
      "Use task.wait() instead of wait() for better performance.",
      "Local variables are faster than global ones – always use local.",
      "Use :Connect() instead of :connect() for events (new Luau syntax).",
      "Avoid using while true do without a task.wait() – it freezes Roblox.",
      "Leverage type checking in Luau to catch bugs early.",
      "Use table.create() for pre-allocated arrays in performance-critical code.",
      "String interpolation is easier with `..` but use string.format() for complex strings.",
      "Learn to use the debug library: debug.traceback() helps find errors.",
      "Don't forget to disconnect connections when they're no longer needed.",
      "Use pcall() to safely call functions that may error.",
    ];
    let tipIndex = 0;
    const tipEl = document.getElementById('luauTip');
    setInterval(() => {
      tipIndex = (tipIndex + 1) % luauTips.length;
      tipEl.style.opacity = '0';
      setTimeout(() => {
        tipEl.textContent = `"${luauTips[tipIndex]}"`;
        tipEl.style.opacity = '1';
      }, 400);
    }, 10000);

    // ---------- Discord Profile via Lanyard ----------
    const USER_ID = "1418597263479144471";
    async function loadDiscord() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        if (!json.success) return;
        const data = json.data;
        document.getElementById('username').textContent = data.discord_user.global_name || data.discord_user.username || "nyx._.dev";
        const avatar = data.discord_user.avatar;
        const avatarImg = document.getElementById('avatar');
        if (avatar) {
          const ext = avatar.startsWith("a_") ? "gif" : "png";
          avatarImg.src = `https://cdn.discordapp.com/avatars/${USER_ID}/${avatar}.${ext}?size=512`;
        } else {
          avatarImg.src = "https://cdn.discordapp.com/embed/avatars/0.png";
        }
        const status = data.discord_status || "offline";
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.className = "dot " + status;
        text.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        const custom = data.activities.find(a => a.type === 4);
        document.getElementById('customStatus').textContent = custom?.state || "";
      } catch (err) {}
    }
    loadDiscord();
    setInterval(loadDiscord, 30000);

    // ---------- Pomodoro Timer ----------
    const timerDisplay = document.getElementById('timerDisplay');
    const pomoStatus = document.getElementById('pomoStatus');
    const startBtn = document.getElementById('pomoStart');
    const resetBtn = document.getElementById('pomoReset');
    const WORK_TIME = 25 * 60;
    const BREAK_TIME = 5 * 60;
    let timerInterval = null;
    let timeLeft = WORK_TIME;
    let isWorking = true;
    let isRunning = false;

    function updateTimerDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      startBtn.textContent = 'Start';
      startBtn.classList.remove('active');
    }

    function resetTimer() {
      stopTimer();
      timeLeft = isWorking ? WORK_TIME : BREAK_TIME;
      updateTimerDisplay();
    }

    function notify(title, body) {
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'https://cdn.discordapp.com/embed/avatars/0.png' });
      }
    }

    function startTimer() {
      if (isRunning) { stopTimer(); return; }
      if (Notification.permission === 'default') Notification.requestPermission();
      isRunning = true;
      startBtn.textContent = 'Pause';
      startBtn.classList.add('active');
      timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          startBtn.textContent = 'Start';
          startBtn.classList.remove('active');
          if (isWorking) {
            notify('Pomodoro finished!', 'Time for a 5‑minute break.');
            isWorking = false;
            pomoStatus.textContent = 'Break session';
            timeLeft = BREAK_TIME;
          } else {
            notify('Break over!', 'Time to get back to work.');
            isWorking = true;
            pomoStatus.textContent = 'Work session';
            timeLeft = WORK_TIME;
          }
          updateTimerDisplay();
          return;
        }
        timeLeft--;
        updateTimerDisplay();
      }, 1000);
    }

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);
    updateTimerDisplay();

    // ---------- Bitcoin Ticker ----------
    async function fetchCrypto() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true');
        const data = await res.json();
        const price = data.bitcoin.usd;
        const change = data.bitcoin.usd_24h_change?.toFixed(2) || 0;
        const priceEl = document.getElementById('btcPrice');
        priceEl.textContent = `$${price.toLocaleString()}`;
        const changeEl = document.getElementById('btcChange');
        changeEl.textContent = `${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%`;
        changeEl.style.color = change >= 0 ? '#4caf50' : '#f44336';
      } catch (err) {
        document.getElementById('btcPrice').textContent = '—';
      }
    }
    fetchCrypto();
    setInterval(fetchCrypto, 60000);

    // ---------- Watermark Typing Effect ----------
    const watermarkEl = document.getElementById('watermark');
    const fullText = "nyx.tuff";
    let charIndex = 0;

    function typeWriter() {
      if (charIndex < fullText.length) {
        watermarkEl.textContent += fullText.charAt(charIndex);
        charIndex++;
        setTimeout(typeWriter, 150); // typing speed in ms
      } else {
        // reset after pause
        setTimeout(() => {
          watermarkEl.textContent = '';
          charIndex = 0;
          typeWriter();
        }, 2000);
      }
    }

    typeWriter();
  </script>
</body>
