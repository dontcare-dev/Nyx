<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NyX Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: #fff; overflow-x: hidden; position: relative;
      animation: bgShift 10s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%); }
      50% { background: radial-gradient(ellipse at 70% 50%, #250000 0%, #0a0000 50%, #020000 100%); }
      100% { background: radial-gradient(ellipse at 30% 90%, #1a0000 0%, #0a0000 50%, #020000 100%); }
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      z-index: 0; pointer-events: none; animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #ff3333, transparent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #cc0000, transparent); bottom: -200px; right: -200px; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ff5555, transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    canvas#particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8;
    }

    .container {
      position: relative; z-index: 1; width: 100%; max-width: 1300px; padding: 20px;
      display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 30px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .glass {
      background: rgba(20, 0, 0, 0.25);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 60, 60, 0.2);
      border-radius: 32px; padding: 30px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      width: 380px; max-width: 100%;
      flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute; top: 0; left: -50%; width: 200%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 45%, rgba(255,255,255,0.03) 50%, transparent 55%);
      pointer-events: none; animation: shine 4s ease-in-out infinite;
    }
    @keyframes shine {
      0%,100% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
    }
    .glass:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 35px 80px rgba(255, 0, 0, 0.5);
      border-color: rgba(255, 80, 80, 0.6);
    }

    .profile-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .avatar {
      width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,50,50,0.7); box-shadow: 0 0 40px rgba(255,0,0,0.6), 0 0 80px rgba(255,0,0,0.3);
      transition: transform 0.4s, border-color 0.4s, box-shadow 0.4s;
      animation: avatarGlitch 3s infinite; background: #2d0000;
    }
    @keyframes avatarGlitch {
      0%,90%,100%{ transform: translate(0); }
      92%{ transform: translate(-4px,3px) skew(2deg); }
      94%{ transform: translate(5px,-3px) skew(-2deg); }
      96%{ transform: translate(-3px,2px) skew(1deg); }
      98%{ transform: translate(3px,-2px) skew(0); }
    }
    .avatar:hover { transform: scale(1.1) rotate(3deg); border-color: #ff4444; box-shadow: 0 0 80px rgba(255,0,0,0.9), 0 0 120px rgba(255,0,0,0.5); }

    /* ========== INTENSE WHITE GLOW ========== */
    .username {
      font-size: 2.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      margin-top: 25px;
      animation: glowPulse 2s ease-in-out infinite alternate;
    }
    .clock {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      margin: 10px 0;
      position: relative;
      animation: glowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from {
        text-shadow:
          0 0 10px #fff,
          0 0 20px #fff,
          0 0 40px rgba(255,255,255,0.8),
          0 0 80px rgba(255,255,255,0.4),
          0 0 120px rgba(255,255,255,0.2);
      }
      to {
        text-shadow:
          0 0 20px #fff,
          0 0 40px #fff,
          0 0 80px rgba(255,255,255,0.9),
          0 0 120px rgba(255,255,255,0.6),
          0 0 180px rgba(255,255,255,0.3);
      }
    }

    .section-title {
      font-size: 1.6rem; font-weight: 600; margin-bottom: 25px;
      display: flex; align-items: center; gap: 12px; color: #ffbbbb;
      text-shadow: 0 0 15px rgba(255,80,80,0.6);
      border-bottom: 2px solid rgba(255,50,50,0.4); padding-bottom: 12px; letter-spacing: 1px;
      justify-content: center;
    }

    .spotify-widget { display: flex; flex-direction: column; gap: 15px; }
    .spotify-embed {
      border-radius: 18px; overflow: hidden; width: 100%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 30px rgba(255,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05); transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .spotify-embed:hover { box-shadow: 0 20px 50px rgba(255,0,0,0.5); transform: scale(1.02); }

    .clock-card { text-align: center; }
    .clock::after {
      content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }
    .date {
      color: #ffaaaa; font-size: 1.1rem; margin-top: 5px; font-weight: 300;
      animation: softPulse 3s ease-in-out infinite;
    }
    @keyframes softPulse {
      0%,100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .dot {
      width: 14px; height: 14px; border-radius: 50%; background: #747f8d;
      display: inline-block; margin-right: 8px; animation: pulse 2s infinite;
    }
    .dot.online { background: #43b581; }
    .dot.idle { background: #faa61a; }
    .dot.dnd { background: #f04747; }
    .dot.offline { background: #747f8d; }

    .time-footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: rgba(255,170,170,0.7);
      letter-spacing: 1px;
      font-weight: 400;
      text-shadow: 0 0 8px rgba(255,0,0,0.5);
      animation: softPulse 4s ease-in-out infinite;
    }

    @media (max-width: 768px) {
      .glass { width: 100%; max-width: 100%; }
      .username { font-size: 2rem; }
      .clock { font-size: 2.5rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>

  <div class="container">
    <!-- Profile Card -->
    <div class="glass profile-card">
      <img class="avatar" id="avatar" src="" alt="Avatar">
      <div class="username" id="username">nyx._.dev</div>
      <div style="margin-top: 15px; color: #ffaaaa; font-size: 1.1rem;">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Loading...</span>
      </div>
      <p style="margin-top: 10px; color: #ccc; font-style: italic;" id="customStatus"></p>
    </div>

    <!-- Spotify Card -->
    <div class="glass spotify-widget">
      <div class="section-title" style="justify-content: center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.48.179-1.08-.061-1.261-.54-.18-.48.06-1.08.54-1.26 4.08-1.32 11.04-1.02 15.721 1.621.539.24.779.899.539 1.44-.24.54-.899.779-1.44.539z"/></svg>
        Spotify
      </div>
      <div class="spotify-embed">
        <iframe src="https://open.spotify.com/embed/playlist/3p7lx9U0uQnIPoo4XNajfX?utm_source=generator&theme=0" 
                width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy" style="border-radius:15px;"></iframe>
      </div>
    </div>

    <!-- Time Card -->
    <div class="glass clock-card">
      <div class="section-title" style="justify-content: center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Time (IST)
      </div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">---</div>
      <div class="time-footer">Made with ❤️ by NyX</div>
    </div>
  </div>

  <script>
    // ---------- Particle Background ----------
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > w) this.speedX *= -1;
        if (this.y < 0 || this.y > h) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 80, 80, ${this.opacity})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      for (let a = 0; a < particles.length; a++) {
        for (let b = a + 1; b < particles.length; b++) {
          let dx = particles[a].x - particles[b].x;
          let dy = particles[a].y - particles[b].y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.strokeStyle = `rgba(255, 80, 80, ${0.06 * (1 - dist / 100)})`;
            ctx.lineWidth = 0.4;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ---------- IST Clock ----------
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
      const dateStr = now.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('clock').textContent = timeStr;
      document.getElementById('date').textContent = dateStr;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ---------- Discord via Lanyard ----------
    const USER_ID = "1418597263479144471";

    async function loadDiscord() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        if (!json.success) throw new Error("Lanyard API failed");
        const data = json.data;

        document.getElementById("username").innerText =
          data.discord_user.global_name || data.discord_user.username || "NyX";

        const avatar = data.discord_user.avatar;
        if (avatar) {
          const ext = avatar.startsWith("a_") ? "gif" : "png";
          document.getElementById("avatar").src =
            `https://cdn.discordapp.com/avatars/${USER_ID}/${avatar}.${ext}?size=512`;
        } else {
          document.getElementById("avatar").src =
            "https://cdn.discordapp.com/embed/avatars/0.png";
        }

        const status = data.discord_status || "offline";
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        dot.className = "dot " + status;
        text.innerText = status.charAt(0).toUpperCase() + status.slice(1);

        const custom = data.activities.find(a => a.type === 4);
        if (custom && custom.state) {
          document.getElementById("customStatus").innerText = custom.state;
        } else {
          document.getElementById("customStatus").innerText = "";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("statusText").innerText = "Offline";
        document.getElementById("customStatus").innerText = "Lanyard not connected";
        document.getElementById("avatar").src = "https://cdn.discordapp.com/embed/avatars/0.png";
      }
    }

    loadDiscord();
    setInterval(loadDiscord, 30000);
  </script>
</body>
</html>
