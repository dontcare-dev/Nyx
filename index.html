<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NyX Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: #fff;
      overflow-x: hidden;
      width: 100vw;
      position: relative;
      animation: bgShift 10s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { background: radial-gradient(ellipse at 30% 10%, #1a0000 0%, #0a0000 50%, #020000 100%); }
      50% { background: radial-gradient(ellipse at 70% 50%, #250000 0%, #0a0000 50%, #020000 100%); }
      100% { background: radial-gradient(ellipse at 30% 90%, #1a0000 0%, #0a0000 50%, #020000 100%); }
    }

    /* ---- ORBS (only opacity, no movement) ---- */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12;
      z-index: 0; pointer-events: none;
      animation: orbFade 6s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #ff3333, transparent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #cc0000, transparent); bottom: -200px; right: -200px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ff5555, transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -5s; }
    @keyframes orbFade {
      0% { opacity: 0.08; }
      100% { opacity: 0.18; }
    }

    /* ---- Particles (lighter) ---- */
    canvas#particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.6;
    }

    /* ---- Matrix Rain (lightweight) ---- */
    #matrixCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      opacity: 0.4;
    }

    .container {
      position: relative; z-index: 1; width: 100%; max-width: 1400px; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .cards-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 20px; width: 100%;
    }

    /* ---- Glass Cards – clean, no scaling ---- */
    .glass {
      background: rgba(20, 0, 0, 0.25);
      border: 1px solid rgba(255, 60, 60, 0.2);
      border-radius: 32px; padding: 25px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      width: 340px; max-width: 100%;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
      animation: cardEntry 0.6s ease-out backwards;
    }
    .glass:nth-child(1) { animation-delay: 0.1s; }
    .glass:nth-child(2) { animation-delay: 0.2s; }
    .glass:nth-child(3) { animation-delay: 0.3s; }
    .glass:nth-child(4) { animation-delay: 0.4s; }
    .glass:nth-child(5) { animation-delay: 0.5s; }

    @keyframes cardEntry {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Shine effect (background-position only) ---- */
    .glass::after {
      content: '';
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.02) 50%, transparent 55%);
      background-size: 200% 100%;
      animation: shine 4s ease-in-out infinite;
      z-index: 0; pointer-events: none;
      border-radius: 32px;
    }
    @keyframes shine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .glass:hover {
      transform: translateY(-5px);
      box-shadow: 0 35px 80px rgba(255, 0, 0, 0.5);
      border-color: rgba(255, 80, 80, 0.6);
    }

    .profile-card, .greeting-card, .pomodoro-card {
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .avatar {
      width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,50,50,0.7);
      box-shadow: 0 0 40px rgba(255,0,0,0.6), 0 0 80px rgba(255,0,0,0.3);
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      animation: avatarRingPulse 2s infinite;
      background: #2d0000;
    }
    @keyframes avatarRingPulse {
      0%,100% { border-color: rgba(255,50,50,0.7); box-shadow: 0 0 40px rgba(255,0,0,0.6); }
      50% { border-color: rgba(255,90,90,0.9); box-shadow: 0 0 60px rgba(255,0,0,0.9); }
    }
    .avatar:hover { transform: scale(1.1) rotate(3deg); border-color: #ff4444; box-shadow: 0 0 80px rgba(255,0,0,0.9); }

    /* ---- Glow (static, no filter, no pulse) ---- */
    .username, .clock, .greeting-text {
      color: #fff;
      font-weight: 700;
      letter-spacing: 3px;
      position: relative;
      z-index: 2;
      text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff3333, 0 0 40px #ff0000;
    }
    .username { font-size: 2.2rem; margin-top: 20px; }
    .clock { font-size: 2.8rem; margin: 10px 0; }
    .greeting-text { font-size: 1.6rem; transition: transform 0.3s; }
    .greeting-text:hover { transform: rotate(-1deg) scale(1.05); }

    .section-title {
      font-size: 1.4rem; font-weight: 600; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px; color: #ffbbbb;
      text-shadow: 0 0 15px rgba(255,80,80,0.6);
      border-bottom: 2px solid rgba(255,50,50,0.4); padding-bottom: 10px; letter-spacing: 1px;
      justify-content: center; position: relative; z-index: 2;
    }
    .section-title svg { width: 20px; height: 20px; }

    .spotify-widget { display: flex; flex-direction: column; gap: 15px; }
    .spotify-embed {
      border-radius: 18px; overflow: hidden; width: 100%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 30px rgba(255,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05); transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .spotify-embed:hover { box-shadow: 0 20px 50px rgba(255,0,0,0.5); transform: scale(1.02); }

    .clock-card { text-align: center; }
    .clock::after {
      content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: lineFade 2s ease-in-out infinite;
    }
    @keyframes lineFade {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .date {
      color: #ffaaaa; font-size: 1rem; margin-top: 5px; font-weight: 300;
      animation: softPulse 3s ease-in-out infinite; position: relative; z-index: 2;
    }
    @keyframes softPulse {
      0%,100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .dot {
      width: 12px; height: 12px; border-radius: 50%; background: #747f8d;
      display: inline-block; margin-right: 6px; animation: pulse 2s infinite;
    }
    .dot.online { background: #43b581; }
    .dot.idle { background: #faa61a; }
    .dot.dnd { background: #f04747; }
    .dot.offline { background: #747f8d; }

    .time-footer {
      margin-top: 20px; font-size: 0.8rem;
      color: rgba(255,170,170,0.7); letter-spacing: 1px; font-weight: 400;
      text-shadow: 0 0 8px rgba(255,0,0,0.5);
      animation: softPulse 4s ease-in-out infinite; position: relative; z-index: 2;
    }

    .luau-tip {
      font-size: 1rem; color: #ffbbbb; margin-top: 15px;
      max-width: 260px; text-align: center;
      transition: opacity 0.4s ease;
      line-height: 1.4;
    }

    /* ---- Pomodoro ---- */
    .timer-display {
      font-size: 2.2rem; font-weight: 700; letter-spacing: 3px;
      margin: 10px 0; color: #fff;
      text-shadow: 0 0 15px #ff0000;
    }
    .pomodoro-controls {
      display: flex; gap: 10px; margin-top: 15px;
    }
    .pomo-btn {
      background: rgba(255,50,50,0.2); border: 1px solid rgba(255,50,50,0.5);
      color: #fff; padding: 8px 16px; border-radius: 20px;
      cursor: pointer; font-weight: 600; transition: 0.3s;
      font-size: 0.9rem; letter-spacing: 1px;
    }
    .pomo-btn:hover { background: rgba(255,50,50,0.4); }
    .pomo-btn.active { background: rgba(255,50,50,0.6); border-color: #ff5555; }

    @media (max-width: 768px) {
      .glass { width: 100%; max-width: 100%; }
      .username { font-size: 1.8rem; }
      .clock { font-size: 2.2rem; }
      .greeting-text { font-size: 1.3rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>
  <canvas id="matrixCanvas"></canvas>

  <div class="container">
    <div class="cards-grid">
      <!-- Profile Card -->
      <div class="glass profile-card">
        <img class="avatar" id="avatar" src="" alt="Avatar">
        <div class="username" id="username">nyx._.dev</div>
        <div style="margin-top: 12px; color: #ffaaaa; font-size: 1rem; position:relative; z-index:2;">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Loading...</span>
        </div>
        <p style="margin-top: 8px; color: #ccc; font-style: italic; position:relative; z-index:2;" id="customStatus"></p>
      </div>

      <!-- Spotify Card -->
      <div class="glass spotify-widget">
        <div class="section-title" style="justify-content: center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.48.179-1.08-.061-1.261-.54-.18-.48.06-1.08.54-1.26 4.08-1.32 11.04-1.02 15.721 1.621.539.24.779.899.539 1.44-.24.54-.899.779-1.44.539z"/></svg>
          Spotify
        </div>
        <div class="spotify-embed">
          <iframe src="https://open.spotify.com/embed/playlist/3p7lx9U0uQnIPoo4XNajfX?utm_source=generator&theme=0" 
                  width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                  loading="lazy" style="border-radius:15px;"></iframe>
        </div>
      </div>

      <!-- Time Card -->
      <div class="glass clock-card">
        <div class="section-title" style="justify-content: center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Time (IST)
        </div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">---</div>
        <div class="time-footer">Made with love by NyX</div>
      </div>

      <!-- Greeting + Luau Tip -->
      <div class="glass greeting-card">
        <div class="greeting-text" id="greeting">Good Evening, NyX</div>
        <div class="luau-tip" id="luauTip">"Use task.wait() instead of wait() for better performance."</div>
      </div>

      <!-- Pomodoro Timer -->
      <div class="glass pomodoro-card">
        <div class="section-title" style="justify-content: center;">Pomodoro</div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="pomodoro-controls">
          <button class="pomo-btn active" id="pomoStart">Start</button>
          <button class="pomo-btn" id="pomoReset">Reset</button>
        </div>
        <p style="margin-top: 10px; color: #ffaaaa; font-size: 0.9rem;" id="pomoStatus">Work session</p>
      </div>
    </div>
  </div>

  <script>
    // ---------- Particle Background (lightweight) ----------
    const pCanvas = document.getElementById('particles');
    const pCtx = pCanvas.getContext('2d');
    let particles = [];
    let pw, ph;

    function resizeParticles() {
      pw = pCanvas.width = window.innerWidth;
      ph = pCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeParticles);
    resizeParticles();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * pw;
        this.y = Math.random() * ph;
        this.size = Math.random() * 1.5 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.3 + 0.05;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > pw) this.speedX *= -1;
        if (this.y < 0 || this.y > ph) this.speedY *= -1;
      }
      draw() {
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fillStyle = `rgba(255, 80, 80, ${this.opacity})`;
        pCtx.fill();
      }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());

    function animateParticles() {
      pCtx.clearRect(0, 0, pw, ph);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ---------- Matrix Rain (optimized) ----------
    const mCanvas = document.getElementById('matrixCanvas');
    const mCtx = mCanvas.getContext('2d');
    let mw, mh;
    const fontSize = 20;
    let columns, drops;

    function setupMatrix() {
      mw = mCanvas.width = window.innerWidth;
      mh = mCanvas.height = window.innerHeight;
      columns = Math.floor(mw / fontSize) + 1;
      drops = Array(columns).fill(1);
    }
    window.addEventListener('resize', setupMatrix);
    setupMatrix();

    const chars = "01";
    function drawMatrix() {
      mCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      mCtx.fillRect(0, 0, mw, mh);
      mCtx.font = `${fontSize}px monospace`;
      mCtx.textAlign = 'center';

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize + fontSize / 2;
        const y = drops[i] * fontSize;

        mCtx.fillStyle = '#ff3333';
        mCtx.shadowColor = '#ff0000';
        mCtx.shadowBlur = 6;
        mCtx.fillText(text, x, y);
        mCtx.shadowBlur = 0;

        if (y > mh && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 80); // relaxed speed

    // ---------- IST Clock & Greeting ----------
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
      const dateStr = now.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('clock').textContent = timeStr;
      document.getElementById('date').textContent = dateStr;

      const hour = now.getHours();
      let greet = "Good Evening, NyX";
      if (hour < 12) greet = "Good Morning, NyX";
      else if (hour < 17) greet = "Good Afternoon, NyX";
      document.getElementById('greeting').innerText = greet;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ---------- Luau Tips ----------
    const luauTips = [
      "Use task.wait() instead of wait() for better performance.",
      "Local variables are faster than global ones – always use local.",
      "Use :Connect() instead of :connect() for events (new Luau syntax).",
      "Avoid using while true do without a task.wait() – it freezes Roblox.",
      "Leverage type checking in Luau to catch bugs early.",
      "Use table.create() for pre-allocated arrays in performance-critical code.",
      "String interpolation is easier with `..` but use string.format() for complex strings.",
      "Learn to use the debug library: debug.traceback() helps find errors.",
      "Don't forget to disconnect connections when they're no longer needed.",
      "Use pcall() to safely call functions that may error.",
    ];
    let tipIndex = 0;
    const tipEl = document.getElementById('luauTip');
    setInterval(() => {
      tipIndex = (tipIndex + 1) % luauTips.length;
      tipEl.style.opacity = '0';
      setTimeout(() => {
        tipEl.innerText = `"${luauTips[tipIndex]}"`;
        tipEl.style.opacity = '1';
      }, 400);
    }, 10000);

    // ---------- Discord via Lanyard ----------
    const USER_ID = "1418597263479144471";

    async function loadDiscord() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        if (!json.success) throw new Error("Lanyard API failed");
        const data = json.data;

        document.getElementById("username").innerText =
          data.discord_user.global_name || data.discord_user.username || "NyX";

        const avatar = data.discord_user.avatar;
        if (avatar) {
          const ext = avatar.startsWith("a_") ? "gif" : "png";
          document.getElementById("avatar").src =
            `https://cdn.discordapp.com/avatars/${USER_ID}/${avatar}.${ext}?size=512`;
        } else {
          document.getElementById("avatar").src =
            "https://cdn.discordapp.com/embed/avatars/0.png";
        }

        const status = data.discord_status || "offline";
        const dot = document.getElementById("statusDot");
        const text = document.getElementById("statusText");
        dot.className = "dot " + status;
        text.innerText = status.charAt(0).toUpperCase() + status.slice(1);

        const custom = data.activities.find(a => a.type === 4);
        document.getElementById("customStatus").innerText = custom?.state || "";
      } catch (err) {
        console.error(err);
        document.getElementById("statusText").innerText = "Offline";
        document.getElementById("customStatus").innerText = "";
        document.getElementById("avatar").src = "https://cdn.discordapp.com/embed/avatars/0.png";
      }
    }
    loadDiscord();
    setInterval(loadDiscord, 30000);

    // ---------- Pomodoro Timer ----------
    const timerDisplay = document.getElementById('timerDisplay');
    const pomoStatus = document.getElementById('pomoStatus');
    const startBtn = document.getElementById('pomoStart');
    const resetBtn = document.getElementById('pomoReset');
    const WORK_TIME = 25 * 60;
    const BREAK_TIME = 5 * 60;
    let timerInterval = null;
    let timeLeft = WORK_TIME;
    let isWorking = true;
    let isRunning = false;

    function updateTimerDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      startBtn.textContent = 'Start';
      startBtn.classList.remove('active');
    }

    function resetTimer() {
      stopTimer();
      timeLeft = isWorking ? WORK_TIME : BREAK_TIME;
      updateTimerDisplay();
    }

    function notify(title, body) {
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'https://cdn.discordapp.com/embed/avatars/0.png' });
      }
    }

    function startTimer() {
      if (isRunning) {
        stopTimer();
        return;
      }
      if (Notification.permission === 'default') {
        Notification.requestPermission();
      }
      isRunning = true;
      startBtn.textContent = 'Pause';
      startBtn.classList.add('active');
      timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          startBtn.textContent = 'Start';
          startBtn.classList.remove('active');
          if (isWorking) {
            notify('Pomodoro finished!', 'Time for a 5‑minute break.');
            isWorking = false;
            pomoStatus.textContent = 'Break session';
            timeLeft = BREAK_TIME;
          } else {
            notify('Break over!', 'Time to get back to work.');
            isWorking = true;
            pomoStatus.textContent = 'Work session';
            timeLeft = WORK_TIME;
          }
          updateTimerDisplay();
          return;
        }
        timeLeft--;
        updateTimerDisplay();
      }, 1000);
    }

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);
    updateTimerDisplay();
  </script>
</body>
</html>
